team: CollOps
env: local

# YAML anchors: define shared Grafana connection once, merge into each service group.
# grafana/otel-lgtm provisions datasources with these UIDs by default.
# If they differ on your machine: curl http://localhost:3000/api/datasources -u admin:admin | jq '.[] | {name,uid}'
x-grafana: &grafana
  grafana_url: http://lgtm:3000   # internal Docker network name — provisioner runs in Docker too
  grafana_token_env: GRAFANA_TOKEN_LOCAL
  datasources:
    mimir: prometheus
    loki: loki
    tempo: tempo

service_groups:
  app:
    <<: *grafana
    thresholds:
      error_rate_warning: 0.05
      error_rate_critical: 0.10
      latency_p99_ms: 500
