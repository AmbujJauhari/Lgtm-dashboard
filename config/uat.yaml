team: CollOps
env: uat

x-grafana: &grafana
  grafana_url: https://grafana.uat.internal
  grafana_token_env: GRAFANA_TOKEN_UAT
  datasources:
    mimir: REPLACE_WITH_UAT_MIMIR_UID
    loki: REPLACE_WITH_UAT_LOKI_UID
    tempo: REPLACE_WITH_UAT_TEMPO_UID

service_groups:
  app:
    <<: *grafana
    thresholds:
      error_rate_warning: 0.05
      error_rate_critical: 0.10
      latency_p99_ms: 500
