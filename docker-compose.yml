# Single grafana/otel-lgtm image bundles Grafana, Loki, Tempo, Prometheus,
# and the OpenTelemetry Collector — no separate service configs needed.
# lgtm is intentionally ephemeral: no named volume, so all state is discarded on `docker compose down`.

networks:
  lgtm:
    driver: bridge

services:

  lgtm:
    image: grafana/otel-lgtm:latest
    container_name: collops-lgtm
    ports:
      - "3001:3000"   # Grafana UI  (admin / admin) — port 3000 taken by Docker Desktop on Windows
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "9090:9090"   # Prometheus  (optional direct access)
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_FEATURE_TOGGLES_ENABLE=nestedFolders
    volumes:
      - ./otel-collector-config.yaml:/otel-lgtm/otelcol-config.yaml:ro
      - ./loki-config.yaml:/otel-lgtm/loki-config.yaml:ro
    networks:
      - lgtm
    restart: unless-stopped

  panels:
    build:
      context: ./panels
      dockerfile: Dockerfile
    container_name: collops-panels
    command: ["deploy"]
    networks:
      - lgtm
    depends_on:
      lgtm:
        condition: service_healthy
    restart: "no"

  dashboards:
    build:
      context: ./dashboards
      dockerfile: Dockerfile
    container_name: collops-dashboards
    command: ["deploy"]
    networks:
      - lgtm
    depends_on:
      lgtm:
        condition: service_healthy
      panels:
        condition: service_completed_successfully
    restart: "no"

  test-data-generator:
    build:
      context: ./test-data-java
      dockerfile: Dockerfile
    container_name: collops-test-data
    environment:
      - OTLP_ENDPOINT=http://lgtm:4317
      - LOKI_ENDPOINT=http://lgtm:3100
      - TEAM=CollOps
      - SERVICE_GROUP=app
      - CMDB_REFERENCE=APP-LOCAL
      - OP_ENVIRONMENT=LOCAL
    networks:
      - lgtm
    depends_on:
      lgtm:
        condition: service_healthy
    restart: unless-stopped
