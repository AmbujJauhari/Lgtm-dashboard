# Root CI — delegates to each module's own pipeline based on which files changed.
# This thin wrapper exists only while panels and dashboards share a mono-repo.
# When panels is extracted to its own repo, panels/.gitlab-ci.yml becomes its root CI.
# When dashboards is extracted, dashboards/.gitlab-ci.yml becomes its root CI.

stages:
  - trigger

panels:
  stage: trigger
  trigger:
    include: panels/.gitlab-ci.yml
    strategy: depend
  rules:
    - changes:
        - panels/**/*

dashboards:
  stage: trigger
  trigger:
    include: dashboards/.gitlab-ci.yml
    strategy: depend
  rules:
    - changes:
        - dashboards/**/*
