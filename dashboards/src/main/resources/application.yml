spring:
  main:
    web-application-type: none
    banner-mode: off
  freemarker:
    # Square-bracket tags: [=folder_uid] instead of ${folder_uid}.
    # This leaves Grafana's own ${__series.name} and {{label}} syntax completely untouched.
    settings:
      tag_syntax: square_bracket
      interpolation_syntax: square_bracket
    suffix: .ftl
    template-loader-path: classpath:/templates/

# @project.version@ is replaced by Maven resource filtering at build time.
app:
  version: "@project.version@"

logging:
  level:
    root: WARN
    com.collops.provisioner: INFO
